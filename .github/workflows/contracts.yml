name: Smart Contracts CI/CD

# Workflow is currently disabled - uncomment 'on' section to enable
# on:
#   push:
#     branches: [ main, develop ]
#     paths: [ 'contracts/**' ]
#   pull_request:
#     branches: [ main ]
#     paths: [ 'contracts/**' ]

# Manual trigger only
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install dependencies
      working-directory: ./contracts
      run: npm install
    
    - name: Compile contracts
      working-directory: ./contracts
      run: npm run compile
      continue-on-error: true
    
    - name: Run tests
      working-directory: ./contracts
      run: npm run test
      continue-on-error: true

  security:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install dependencies
      working-directory: ./contracts
      run: npm install
    
    - name: Install Slither
      run: pip3 install slither-analyzer
      continue-on-error: true
    
    - name: Run Slither analysis
      working-directory: ./contracts
      run: slither . --print human-summary
      continue-on-error: true
